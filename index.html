<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
      body { margin: 0; overflow: hidden; }
    </style>
  </head>
  <body>
    
    <a-scene
      mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.00001;
  filterBeta: 0.01;
  warmupTolerance: 5;
  missTolerance: 10;"
      vr-mode-ui="enabled: false"
      device-orientation-permission-ui="enabled: false"
    >

      <!-- Preloads the assests -->
      <a-assets>
        <a-asset-item id="myModel" src="https://pub-f776e732125a4907a8bdd8fbed38ac06.r2.dev/model.glb" crossorigin="anonymous"></a-asset-item>
      </a-assets>

      <!-- Camera -->
      <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

      <!-- Marker Shows when marker detect -->
      <a-entity mindar-image-target="targetIndex: 0">
        <a-gltf-model
          src="#myModel"
          position="0 0 0.2"
          scale="0.8 0.8 0.8"
          rotation="90 0 0"
        ></a-gltf-model>
      </a-entity>

    </a-scene>

    <button>Click</button>
  </body>
</html>
